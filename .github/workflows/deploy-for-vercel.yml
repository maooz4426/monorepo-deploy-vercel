name: deploy-for-vercel.yml
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  ENV_JSON: |
    ${{ 
      fromJson('{
        "staging":{
          "PM": pnpm,
          "DIRECTORY": ./pnpm,
          "VERCEL_ENV": preview,
          "VERCEL_URL": stg-monorepo-deploy-vercel.vercel.app
        },
        "production":{
          "PM": yarn,
          "DIRECTORY": ./yarn,
          "VERCEL_ENV": production,
          "VERCEL_URL": monorepo-deploy-vercel.vercel.app
        }
      }')[inputs.environment]
    }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ toJson(env.ENV_JSON).DIRECTORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ toJson(env.ENV_JSON).DIRECTORY }}/package.json
      - name: Install pnpm
        if: ${{ toJson(env.ENV_JSON).DIRECTORY == './pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install dependencies
        run: ${{ toJson(env.ENV_JSON).PM }} install
      - name: Install vercel CLI
        run: ｜
          if [ -f yarn.lock ]; then
            yarn global add vercel
          elif [ -f pnpm-lock.yaml ]; then
            pnpm add -g vercel
          fi
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ toJson(env.ENV_JSON).VERCEL_ENV }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          output=$(vercel --token $VERCEL_TOKEN)
          echo "$output"
          echo "url=$output" >> $GITHUB_OUTPUT
      - name: set Vercel Alias
        run: |
          vercel alias set ${{ steps.vercel_deploy.outputs.url }} ${{ toJson(env.ENV_JSON).VERCEL_URL }} --token=${{ secrets.VERCEL_TOKEN }}


