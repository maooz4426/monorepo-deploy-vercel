name: deploy-stg.yml
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
        run:
          working-directory: ./pnpm
    steps:
        - name: Checkout code
          uses: actions/checkout@v2
        - name: Set up Node.js
          uses: actions/setup-node@v2
          with:
            node-version: '20'
        - uses: pnpm/action-setup@v4
          name: Install pnpm
          with:
            version: 10
            run_install: true
        - name: Install vercel CLI
          run: pnpm install -g vercel
        - name: Pull Vercel Environment Information
          run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        - name: Build Project Artifacts
          run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        - name: Deploy Project Artifacts to Vercel
          id: vercel-deploy
          run: |
            OUTPUT=$(vercel deploy --target=preview --token=${{ secrets.VERCEL_TOKEN }})
            PREVIEW_URL=$(echo "$OUTPUT" | grep "Preview:" | awk '{print $2}')
            echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
            echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        - name: Set ailias for staging
          run: |
            echo "デプロイされたURL: ${{ steps.vercel-deploy.outputs.preview_url }}"
#          vercel alias set https://stg-monorepo-deploy-vercel.vercel.app　--token=${{ secrets.VERCEL_TOKEN }}
          
